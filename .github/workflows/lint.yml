name: CI

permissions:
  contents: read

on:
  pull_request:
  push:
    branches:
      - main

jobs:
  verify:
    name: Verify
    runs-on: ubuntu-latest

    steps:
      - name: Check out Git repository
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd #v6.0.2

      - name: Set up Node.js
        uses: actions/setup-node@53b83947a5a98c8d113130e565377fae1a50d02f #v6.3.0
        with:
          node-version: 24
          cache: npm

      - name: Install Node.js dependencies
        run: npm ci

      - name: Build
        run: npm run build

      - name: Run lint
        run: npm run lint

      - name: Run formatting checks
        run: npm run format:check

      - name: Run tests
        run: npm test

      - name: Check generated tools list
        run: npm run list-tools:check

      - name: Run MCP smoke test
        run: npm run smoke:mcp

      - name: Build Docker image
        run: npm run docker:build

      - name: Run Docker MCP smoke test
        run: npm run smoke:docker
